<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes — Evaluación 180°</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy-900:#0D1B2A;
  --navy-800:#1E3A5F;
  --navy-700:#1D4E89;
  --navy-600:#2563EB;
  --navy-400:#60A5FA;
  --navy-300:#93C5FD;
  --navy-100:#DBEAFE;
  --navy-50:#EFF6FF;
  --slate-900:#0F172A;
  --slate-700:#334155;
  --slate-600:#475569;
  --slate-400:#94A3B8;
  --slate-300:#CBD5E1;
  --slate-200:#E2E8F0;
  --slate-100:#F1F5F9;
  --slate-50:#F8FAFC;
  --white:#FFFFFF;
  /* Semáforo */
  --s5-c:#16A34A;  --s5-bg:#DCFCE7;
  --s4-c:#65A30D;  --s4-bg:#ECFCCB;
  --s3-c:#D97706;  --s3-bg:#FEF3C7;
  --s2-c:#DC2626;  --s2-bg:#FEE2E2;
  --s1-c:#991B1B;  --s1-bg:#FEE2E2;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--slate-100);color:var(--slate-900);font-size:14px}

@media print{
  .no-print{display:none!important}
  body{background:var(--white)}
  .report-wrap{padding:0!important}
  .section-card{box-shadow:none!important;border-color:var(--slate-200)!important}
  .page-break{page-break-before:always}
}

/* Topbar */
.topbar{background:var(--navy-900);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-info{display:flex;flex-direction:column}
.topbar-title{font-size:14px;font-weight:600;color:var(--white)}
.topbar-sub{font-size:11px;color:var(--navy-400);margin-top:2px}
.topbar-actions{display:flex;gap:8px}
.btn-top{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);color:var(--white);border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:7px 14px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;text-decoration:none}
.btn-top:hover{background:rgba(255,255,255,.2)}

/* Layout */
.report-wrap{max-width:1000px;margin:0 auto;padding:28px 24px 60px}

/* Section cards */
.section-card{background:var(--white);border:1px solid var(--slate-200);border-radius:12px;padding:28px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.section-header{border-bottom:3px solid var(--navy-800);padding-bottom:16px;margin-bottom:22px}
.section-title{font-size:19px;font-weight:700;color:var(--navy-900)}
.section-meta{display:flex;flex-wrap:wrap;gap:16px;margin-top:8px}
.meta-tag{font-size:11px;color:var(--slate-400);font-family:var(--mono)}
.meta-tag strong{color:var(--slate-700)}
.sub-title{font-size:12px;font-weight:600;color:var(--slate-600);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 12px}

/* Semáforo badges */
.score-badge{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;font-size:15px;font-weight:700;font-family:var(--mono)}
.score-pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;font-family:var(--mono)}
.s5{background:var(--s5-bg);color:var(--s5-c)}
.s4{background:var(--s4-bg);color:var(--s4-c)}
.s3{background:var(--s3-bg);color:var(--s3-c)}
.s2{background:var(--s2-bg);color:var(--s2-c)}
.s1{background:var(--s1-bg);color:var(--s1-c)}
.s0{background:var(--slate-100);color:var(--slate-400)}

/* Progress bars semáforo */
.bar-track{height:8px;background:var(--slate-200);border-radius:4px;overflow:hidden}
.bar-fill{height:8px;border-radius:4px;transition:width .5s}

/* Legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--slate-600)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--navy-800)}
th{text-align:left;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:.07em;padding:10px 14px}
td{padding:10px 14px;border-bottom:1px solid var(--slate-100);font-size:13px;color:var(--slate-600)}
td:first-child{color:var(--slate-900);font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--navy-50)}

/* Colaborador summary cards */
.colab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.colab-card{border:1px solid var(--slate-200);border-radius:10px;padding:16px;background:var(--white);transition:border .2s}
.colab-card:hover{border-color:var(--navy-400)}
.colab-name{font-weight:600;color:var(--slate-900);font-size:14px}
.colab-meta{font-size:11px;color:var(--slate-400);margin-top:2px;font-family:var(--mono)}
.colab-score-row{display:flex;align-items:baseline;gap:8px;margin:10px 0 6px}
.colab-big-score{font-size:32px;font-weight:700;font-family:var(--mono)}
.colab-score-label{font-size:11px;color:var(--slate-400)}
.status-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;margin-top:8px}
.dot{width:7px;height:7px;border-radius:50%}

/* Charts row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.chart-box{position:relative;min-height:260px}

/* ── INTERPRETACIÓN Y 70-20-10 ── */
.interp-card{border-radius:10px;padding:16px 18px;margin-bottom:12px;border-left:4px solid}
.interp-alineado{background:#F0FDF4;border-color:var(--s5-c)}
.interp-positivo{background:var(--navy-50);border-color:var(--navy-600)}
.interp-negativo{background:#FFF7ED;border-color:var(--s3-c)}
.interp-neutro{background:var(--slate-50);border-color:var(--slate-300)}
.interp-comp-name{font-size:13px;font-weight:600;color:var(--slate-900);margin-bottom:5px;display:flex;align-items:center;gap:8px}
.interp-text{font-size:12px;color:var(--slate-600);line-height:1.6}

.rec-card{background:var(--white);border:1px solid var(--slate-200);border-radius:10px;overflow:hidden;margin-bottom:14px}
.rec-header{background:var(--navy-800);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.rec-comp{font-size:13px;font-weight:600;color:var(--white)}
.rec-label{font-size:11px;font-weight:500;color:var(--navy-300)}
.rec-body{padding:16px 18px}
.rec-pillar{display:flex;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--slate-100)}
.rec-pillar:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.rec-pct{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--navy-700);min-width:40px;flex-shrink:0}
.rec-pct-label{font-size:9px;color:var(--navy-400);text-transform:uppercase;letter-spacing:.08em;line-height:1;margin-top:2px}
.rec-pillar-title{font-size:12px;font-weight:600;color:var(--slate-900);margin-bottom:3px}
.rec-pillar-text{font-size:12px;color:var(--slate-600);line-height:1.5}

/* Top 3 resumen */
.top3-card{background:var(--navy-900);border-radius:12px;padding:24px;margin-top:24px;margin-bottom:8px}
.top3-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:4px}
.top3-sub{font-size:12px;color:var(--navy-300);margin-bottom:20px}
.top3-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.top3-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.top3-num{width:28px;height:28px;border-radius:50%;background:var(--navy-600);color:var(--white);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono)}
.top3-comp{font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px}
.top3-score{font-size:11px;color:var(--navy-300)}
.top3-pills{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.top3-pill{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.top3-pill-70{background:rgba(37,99,235,.3);color:var(--navy-300)}
.top3-pill-20{background:rgba(5,150,105,.25);color:#6EE7B7}
.top3-pill-10{background:rgba(245,158,11,.2);color:#FDE68A}

/* Comentarios */
.comment-box{background:var(--slate-50);border-left:3px solid var(--slate-300);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:10px}
.comment-tipo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.comment-tipo.lider{color:var(--navy-700)}
.comment-tipo.autoevaluacion{color:var(--s5-c)}
.comment-text{font-size:13px;color:var(--slate-600);line-height:1.6}

/* Individual score hero */
.hero-score{background:linear-gradient(135deg,var(--navy-900),var(--navy-700));border-radius:12px;padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.hero-name{font-size:20px;font-weight:700;color:var(--white)}
.hero-meta{font-size:12px;color:var(--navy-300);margin-top:4px}
.hero-right{text-align:right}
.hero-num{font-size:52px;font-weight:800;font-family:var(--mono);line-height:1}
.hero-label{font-size:11px;color:var(--navy-300);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

/* Brecha badge */
.gap-pos{color:var(--s5-c);font-weight:600}
.gap-neg{color:var(--s2-c);font-weight:600}
.gap-neu{color:var(--slate-400)}

/* Loading/error */
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid var(--slate-200);border-top-color:var(--navy-800);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="state-loading" class="screen">
  <div style="text-align:center"><div class="spinner"></div><p style="color:var(--slate-400)">Cargando reporte...</p></div>
</div>
<div id="state-error" class="screen" style="display:none">
  <div style="text-align:center;max-width:400px">
    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
    <p style="font-size:16px;font-weight:600;color:var(--slate-900)">Error al cargar reporte</p>
    <p style="font-size:13px;color:var(--slate-600);margin-top:8px" id="err-detail"></p>
  </div>
</div>
<div id="state-report" style="display:none">
  <div class="topbar no-print">
    <div class="topbar-info"><div class="topbar-title" id="top-title">Reporte</div><div class="topbar-sub" id="top-sub"></div></div>
    <div class="topbar-actions">
      <a href="index.html" class="btn-top">← Panel RRHH</a>
      <button class="btn-top" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="1" width="10" height="10" rx="1"/><path d="M1 7h14v6a1 1 0 01-1 1H2a1 1 0 01-1-1V7z"/></svg>
        Exportar PDF
      </button>
    </div>
  </div>
  <div class="report-wrap" id="report-container"></div>
</div>

<script src="config.js"></script>
<script>
function show(s) {
  ['loading','error','report'].forEach(id => document.getElementById('state-'+id).style.display = id===s?'block':'none');
}

function sClass(v) {
  if (!v) return 's0';
  if (v>=4.5) return 's5';
  if (v>=3.5) return 's4';
  if (v>=2.5) return 's3';
  if (v>=1.5) return 's2';
  return 's1';
}

function barColor(v) {
  if (!v) return '#CBD5E1';
  if (v>=4.5) return '#16A34A';
  if (v>=3.5) return '#65A30D';
  if (v>=2.5) return '#D97706';
  return '#DC2626';
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { proceso_id: p.get('proceso_id'), tipo: p.get('tipo'), lider_email: p.get('lider_email'), persona_id: p.get('persona_id') };
}

// ══ REPORTE GENERAL ══════════════════════════════════════════
async function renderGeneral(pid) {
  const d = await api('get_reporte_general',{proceso_id:pid});
  document.getElementById('top-title').textContent = 'Reporte general — ' + d.proceso.nombre;
  document.getElementById('top-sub').textContent   = d.proceso.cliente + ' · ' + d.colaboradores.length + ' colaboradores';

  const avgGlobal = d.colaboradores.filter(c=>c.prom_total).reduce((a,c,_,arr)=>a+c.prom_total/arr.length,0);

  const container = document.getElementById('report-container');
  container.innerHTML = `
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">Reporte general de evaluación 180°</div>
        <div class="section-meta">
          <div class="meta-tag">Proceso: <strong>${d.proceso.nombre}</strong></div>
          <div class="meta-tag">Cliente: <strong>${d.proceso.cliente}</strong></div>
          <div class="meta-tag">Período: <strong>${d.proceso.fecha_inicio} → ${d.proceso.fecha_cierre}</strong></div>
          <div class="meta-tag">Colaboradores: <strong>${d.colaboradores.length}</strong></div>
          <div class="meta-tag">Promedio global: <strong class="score-pill ${sClass(avgGlobal)}">${avgGlobal.toFixed(2)}</strong></div>
        </div>
      </div>

      <div class="sub-title">Resumen por colaborador</div>
      <div class="colab-grid">
        ${d.colaboradores.map(c => {
          const sc = sClass(c.prom_total);
          const col = barColor(c.prom_total);
          return `<div class="colab-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div><div class="colab-name">${c.nombre}</div><div class="colab-meta">${c.cargo||'—'} · ${c.area||'—'}</div></div>
              <span class="score-badge ${sc}">${c.prom_total?c.prom_total.toFixed(1):'—'}</span>
            </div>
            <div class="bar-track" style="margin-top:10px"><div class="bar-fill" style="width:${c.prom_total?Math.round(c.prom_total/5*100):0}%;background:${col}"></div></div>
            <div style="display:flex;gap:6px;margin-top:8px">
              <span class="status-dot"><span class="dot" style="background:${c.completado_lider?'#16A34A':'#DC2626'}"></span><span style="font-size:11px;color:var(--slate-400)">Líder</span></span>
              <span class="status-dot"><span class="dot" style="background:${c.completado_auto?'#16A34A':'#DC2626'}"></span><span style="font-size:11px;color:var(--slate-400)">Auto</span></span>
            </div>
            <div style="font-size:11px;color:var(--slate-400);margin-top:6px">Líder: ${c.lider_nombre||'—'}</div>
          </div>`;
        }).join('')}
      </div>

      <div class="sub-title" style="margin-top:24px">Detalle por competencia</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Colaborador</th>
            ${d.competencias.map(c=>`<th style="text-align:center">${c.nombre.split(' ').slice(0,2).join(' ')}</th>`).join('')}
            <th style="text-align:center">Total</th>
          </tr></thead>
          <tbody>
            ${d.colaboradores.map(c=>`
              <tr>
                <td>${c.nombre}</td>
                ${c.promedios.map(p=>{
                  const avg = p.prom_lider&&p.prom_auto?(p.prom_lider+p.prom_auto)/2:(p.prom_lider||p.prom_auto||null);
                  return `<td style="text-align:center">
                    <div class="bar-track" style="width:60px;margin:0 auto 3px"><div class="bar-fill" style="width:${avg?Math.round(avg/5*100):0}%;background:${barColor(avg)}"></div></div>
                    <span style="font-size:11px;font-family:var(--mono);color:var(--slate-600)">${avg?avg.toFixed(1):'—'}</span>
                  </td>`;
                }).join('')}
                <td style="text-align:center"><span class="score-pill ${sClass(c.prom_total)}">${c.prom_total?c.prom_total.toFixed(2):'—'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  show('report');

  // Radar global
  const avgByComp = d.competencias.map((_,ci)=>{
    const vals = d.colaboradores.map(col=>col.promedios[ci]).filter(p=>p&&(p.prom_lider||p.prom_auto));
    const avgs = vals.map(p=>p.prom_lider&&p.prom_auto?(p.prom_lider+p.prom_auto)/2:(p.prom_lider||p.prom_auto));
    return avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:0;
  });

  const radarDiv = document.createElement('div');
  radarDiv.className = 'section-card no-print';
  radarDiv.innerHTML = `<div class="sub-title" style="margin-top:0">Radar global — promedio por competencia</div><div style="max-width:460px;margin:0 auto"><canvas id="radar-gen"></canvas></div>`;
  container.appendChild(radarDiv);

  new Chart(document.getElementById('radar-gen'),{
    type:'radar',
    data:{ labels: d.competencias.map(c=>c.nombre.length>16?c.nombre.substr(0,16)+'…':c.nombre),
      datasets:[{label:'Promedio',data:avgByComp,backgroundColor:'rgba(30,58,95,.12)',borderColor:'#1E3A5F',borderWidth:2,pointBackgroundColor:'#1E3A5F',pointRadius:4}]},
    options:{scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10}},pointLabels:{font:{size:10}}}},plugins:{legend:{display:false}}}
  });
}

// ══ REPORTE POR LÍDER ════════════════════════════════════════
async function renderLider(pid,liderEmail) {
  const d = await api('get_reporte_lider',{proceso_id:pid,lider_email:liderEmail});
  document.getElementById('top-title').textContent = 'Reporte del equipo';
  document.getElementById('top-sub').textContent   = d.proceso.nombre + ' · ' + liderEmail;

  const container = document.getElementById('report-container');
  container.innerHTML = `
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">Reporte del equipo</div>
        <div class="section-meta">
          <div class="meta-tag">Proceso: <strong>${d.proceso.nombre}</strong></div>
          <div class="meta-tag">Líder: <strong>${liderEmail}</strong></div>
          <div class="meta-tag">Colaboradores: <strong>${d.equipo.length}</strong></div>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1E3A5F"></div>Evaluación del líder</div>
        <div class="legend-item"><div class="legend-dot" style="background:#16A34A"></div>Autoevaluación</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Colaborador</th>${d.competencias.map(c=>`<th style="text-align:center;min-width:68px">${c.nombre.split(' ').slice(0,2).join(' ')}</th>`).join('')}</tr></thead>
          <tbody>${d.equipo.map(col=>`
            <tr>
              <td>${col.nombre}<div style="font-size:11px;color:var(--slate-400)">${col.cargo||''}</div></td>
              ${col.promedios.map(p=>`<td style="text-align:center;padding:6px">
                <div style="font-size:11px;font-family:var(--mono);color:#1E3A5F">${p.prom_lider?p.prom_lider.toFixed(1):'—'}</div>
                <div style="font-size:11px;font-family:var(--mono);color:#16A34A">${p.prom_auto?p.prom_auto.toFixed(1):'—'}</div>
              </td>`).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  show('report');

  d.equipo.forEach((col,idx)=>{
    const div = document.createElement('div');
    div.className = 'section-card' + (idx>0?' page-break':'');
    div.innerHTML = `
      <div class="section-header">
        <div class="section-title">${col.nombre}</div>
        <div class="section-meta"><div class="meta-tag">${col.cargo||''}</div></div>
      </div>
      <div class="charts-row">
        <div class="chart-box"><canvas id="lbar-${idx}"></canvas></div>
        <div class="chart-box"><canvas id="lrad-${idx}"></canvas></div>
      </div>
      ${col.comentarios.length?`
        <div class="sub-title">Comentarios</div>
        ${col.comentarios.map(c=>`<div class="comment-box"><div class="comment-tipo ${c.tipo}">${c.tipo==='lider'?'Del líder':'Autoevaluación'}</div><div class="comment-text">${c.texto||'—'}</div></div>`).join('')}`:''}`; 
    container.appendChild(div);

    const lbl = col.promedios.map(p=>p.nombre.length>14?p.nombre.substr(0,14)+'…':p.nombre);
    new Chart(document.getElementById('lbar-'+idx),{type:'bar',data:{labels:lbl,datasets:[
      {label:'Líder',data:col.promedios.map(p=>p.prom_lider),backgroundColor:'rgba(30,58,95,.75)',borderRadius:4},
      {label:'Autoevaluación',data:col.promedios.map(p=>p.prom_auto),backgroundColor:'rgba(22,163,74,.6)',borderRadius:4},
    ]},options:{scales:{y:{min:0,max:5}},plugins:{legend:{position:'top'}}}});
    new Chart(document.getElementById('lrad-'+idx),{type:'radar',data:{labels:lbl,datasets:[
      {label:'Líder',data:col.promedios.map(p=>p.prom_lider),backgroundColor:'rgba(30,58,95,.12)',borderColor:'#1E3A5F',borderWidth:2,pointRadius:3},
      {label:'Autoevaluación',data:col.promedios.map(p=>p.prom_auto),backgroundColor:'rgba(22,163,74,.1)',borderColor:'#16A34A',borderWidth:2,pointRadius:3},
    ]},options:{scales:{r:{min:0,max:5,ticks:{font:{size:9}},pointLabels:{font:{size:9}}}},plugins:{legend:{position:'top'}}}});
  });
}

// ══ REPORTE INDIVIDUAL ═══════════════════════════════════════
async function renderIndividual(pid,personaId) {
  if (!personaId) {
    const d = await api('get_reporte_general',{proceso_id:pid});
    show('report');
    document.getElementById('top-title').textContent = 'Reporte individual';
    document.getElementById('top-sub').textContent   = d.proceso.nombre;
    const c = document.getElementById('report-container');
    c.innerHTML = `
      <div class="section-card">
        <div class="section-header"><div class="section-title">Selecciona un colaborador</div></div>
        ${d.colaboradores.map(col=>`
          <div onclick="reloadWithPersona('${col.persona_id}')" style="padding:14px 16px;border:1px solid var(--slate-200);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;transition:border .15s" onmouseover="this.style.borderColor='var(--navy-600)'" onmouseout="this.style.borderColor='var(--slate-200)'">
            <div><div style="font-weight:500;color:var(--slate-900)">${col.nombre}</div><div style="font-size:11px;color:var(--slate-400);font-family:var(--mono)">${col.cargo||''} · ${col.area||''}</div></div>
            <span class="score-pill ${sClass(col.prom_total)}">${col.prom_total?col.prom_total.toFixed(2):'—'}</span>
          </div>`).join('')}
      </div>`;
    return;
  }

  const d = await api('get_reporte_individual',{proceso_id:pid,persona_id:personaId});
  const {persona, competencias, promedios, comentarios, proceso} = d;

  const promLider = promedios.filter(p=>p.prom_lider).reduce((a,p,_,arr)=>a+p.prom_lider/arr.length,0);
  const promAuto  = promedios.filter(p=>p.prom_auto).reduce((a,p,_,arr)=>a+p.prom_auto/arr.length,0);
  const promTotal = (promLider+promAuto)/2;

  document.getElementById('top-title').textContent = 'Reporte individual — ' + persona.nombre;
  document.getElementById('top-sub').textContent   = proceso.nombre;

  const container = document.getElementById('report-container');

  // ── Hero ──────────────────────────────────────────────────
  const heroColor = barColor(promTotal);
  container.innerHTML = `
    <div class="hero-score">
      <div>
        <div class="hero-name">${persona.nombre}</div>
        <div class="hero-meta">${persona.cargo||'—'} · ${persona.area||'—'} · Líder: ${persona.lider_nombre||'—'}</div>
        <div style="display:flex;gap:16px;margin-top:14px">
          <div><div style="font-size:11px;color:var(--navy-300)">Líder</div><div style="font-size:22px;font-weight:700;font-family:var(--mono);color:var(--white)">${promLider.toFixed(2)}</div></div>
          <div><div style="font-size:11px;color:var(--navy-300)">Autoevaluación</div><div style="font-size:22px;font-weight:700;font-family:var(--mono);color:var(--white)">${promAuto.toFixed(2)}</div></div>
        </div>
      </div>
      <div class="hero-right">
        <div class="hero-num" style="color:${heroColor}">${promTotal.toFixed(2)}</div>
        <div class="hero-label">Promedio global</div>
        <div style="margin-top:8px"><span class="score-pill ${sClass(promTotal)}">${nivelLabel(promTotal)}</span></div>
      </div>
    </div>`;

  // ── Gráficas ──────────────────────────────────────────────
  const chartCard = document.createElement('div');
  chartCard.className = 'section-card';
  chartCard.innerHTML = `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1E3A5F"></div>Evaluación del líder</div>
      <div class="legend-item"><div class="legend-dot" style="background:#16A34A"></div>Autoevaluación</div>
    </div>
    <div class="charts-row">
      <div class="chart-box"><canvas id="ibar"></canvas></div>
      <div class="chart-box"><canvas id="irad"></canvas></div>
    </div>`;
  container.appendChild(chartCard);

  // ── Tabla detalle ─────────────────────────────────────────
  const tableCard = document.createElement('div');
  tableCard.className = 'section-card';
  tableCard.innerHTML = `
    <div class="sub-title" style="margin-top:0">Detalle por competencia</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Competencia</th><th style="text-align:center">Líder</th><th style="text-align:center">Autoevaluación</th><th style="text-align:center">Brecha</th><th>Nivel</th></tr></thead>
        <tbody>
          ${promedios.map(p=>{
            const brecha = p.prom_lider!==null&&p.prom_auto!==null ? (p.prom_lider-p.prom_auto).toFixed(2) : '—';
            const bn = parseFloat(brecha);
            const bClass = !isNaN(bn) ? (bn>0.3?'gap-pos':bn<-0.3?'gap-neg':'gap-neu') : 'gap-neu';
            const bLabel = !isNaN(bn) ? (bn>0.3?'▲ Líder mayor':bn<-0.3?'▼ Auto mayor':'≈ Alineados') : '—';
            const avg = p.prom_lider&&p.prom_auto?(p.prom_lider+p.prom_auto)/2:(p.prom_lider||p.prom_auto||null);
            return `<tr>
              <td>${p.nombre}</td>
              <td style="text-align:center"><span class="score-pill ${sClass(p.prom_lider)}">${p.prom_lider?p.prom_lider.toFixed(2):'—'}</span></td>
              <td style="text-align:center"><span class="score-pill ${sClass(p.prom_auto)}">${p.prom_auto?p.prom_auto.toFixed(2):'—'}</span></td>
              <td style="text-align:center"><span class="${bClass}">${brecha!=='—'?brecha:brecha}</span><br><span style="font-size:10px;color:var(--slate-400)">${bLabel}</span></td>
              <td><span class="score-pill ${sClass(avg)}">${nivelLabel(avg)}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  container.appendChild(tableCard);

  // ── Interpretación por competencia ────────────────────────
  const interpCard = document.createElement('div');
  interpCard.className = 'section-card page-break';
  interpCard.innerHTML = `<div class="sub-title" style="margin-top:0">Análisis de brechas por competencia</div>`;

  promedios.forEach(p => {
    const avg = p.prom_lider&&p.prom_auto?(p.prom_lider+p.prom_auto)/2:(p.prom_lider||p.prom_auto||0);
    const { texto, tipo } = interpretarBrecha(p.nombre, p.prom_lider, p.prom_auto, avg);
    const iconos = { alineado:'✓', positivo:'↑', negativo:'↓', neutro:'—' };
    interpCard.innerHTML += `
      <div class="interp-card interp-${tipo}">
        <div class="interp-comp-name">
          <span class="score-pill ${sClass(avg)}">${avg?avg.toFixed(2):'—'}</span>
          ${p.nombre}
          <span style="font-size:13px">${iconos[tipo]||''}</span>
        </div>
        <div class="interp-text">${texto}</div>
      </div>`;
  });
  container.appendChild(interpCard);

  // ── Recomendaciones 70-20-10 por competencia con brecha o nivel bajo ──
  const compsPrioritarias = promedios
    .filter(p => {
      const avg = p.prom_lider&&p.prom_auto?(p.prom_lider+p.prom_auto)/2:(p.prom_lider||p.prom_auto||0);
      const brecha = p.prom_lider!==null&&p.prom_auto!==null ? Math.abs(p.prom_lider-p.prom_auto) : 0;
      return avg < 4.0 || brecha >= 0.5;
    })
    .sort((a,b) => {
      const avgA = a.prom_lider&&a.prom_auto?(a.prom_lider+a.prom_auto)/2:(a.prom_lider||a.prom_auto||5);
      const avgB = b.prom_lider&&b.prom_auto?(b.prom_lider+b.prom_auto)/2:(b.prom_lider||b.prom_auto||5);
      return avgA - avgB;
    });

  if (compsPrioritarias.length > 0) {
    const recCard = document.createElement('div');
    recCard.className = 'section-card';
    recCard.innerHTML = `<div class="sub-title" style="margin-top:0">Plan de desarrollo — Modelo 70-20-10</div>
      <p style="font-size:12px;color:var(--slate-400);margin-bottom:16px">Recomendaciones de desarrollo para las competencias con oportunidad de mejora o brecha de percepción significativa.</p>`;

    compsPrioritarias.forEach(p => {
      const avg = p.prom_lider&&p.prom_auto?(p.prom_lider+p.prom_auto)/2:(p.prom_lider||p.prom_auto||0);
      const rec = recomendaciones7020(p.nombre, avg);
      recCard.innerHTML += `
        <div class="rec-card">
          <div class="rec-header">
            <div class="rec-comp">${p.nombre}</div>
            <div style="display:flex;align-items:center;gap:10px">
              <span class="score-pill ${sClass(avg)}" style="font-size:12px">${avg?avg.toFixed(2):'—'}</span>
              <span class="rec-label">${rec.label}</span>
            </div>
          </div>
          <div class="rec-body">
            <div class="rec-pillar">
              <div><div class="rec-pct">70%</div><div class="rec-pct-label">Experiencia</div></div>
              <div><div class="rec-pillar-title">Aprendizaje en el trabajo</div><div class="rec-pillar-text">${rec.r70}</div></div>
            </div>
            <div class="rec-pillar">
              <div><div class="rec-pct">20%</div><div class="rec-pct-label">Relaciones</div></div>
              <div><div class="rec-pillar-title">Aprendizaje social</div><div class="rec-pillar-text">${rec.r20}</div></div>
            </div>
            <div class="rec-pillar">
              <div><div class="rec-pct">10%</div><div class="rec-pct-label">Formal</div></div>
              <div><div class="rec-pillar-title">Formación estructurada</div><div class="rec-pillar-text">${rec.r10}</div></div>
            </div>
          </div>
        </div>`;
    });
    container.appendChild(recCard);
  }

  // ── Top 3 resumen ─────────────────────────────────────────
  const top3 = promedios
    .map(p => { const avg = p.prom_lider&&p.prom_auto?(p.prom_lider+p.prom_auto)/2:(p.prom_lider||p.prom_auto||5); return {...p, avg}; })
    .sort((a,b)=>a.avg-b.avg)
    .slice(0,3);

  if (top3.length > 0) {
    const top3Card = document.createElement('div');
    top3Card.className = 'section-card';
    top3Card.innerHTML = `
      <div class="top3-card">
        <div class="top3-title">Top 3 prioridades de desarrollo</div>
        <div class="top3-sub">Competencias con mayor oportunidad de crecimiento para ${persona.nombre}</div>
        ${top3.map((p,i) => {
          const rec = recomendaciones7020(p.nombre, p.avg);
          return `<div class="top3-item">
            <div class="top3-num">${i+1}</div>
            <div style="flex:1">
              <div class="top3-comp">${p.nombre}</div>
              <div class="top3-score">Promedio: ${p.avg.toFixed(2)} · ${nivelLabel(p.avg)}</div>
              <div class="top3-pills">
                <span class="top3-pill top3-pill-70">70% ${rec.r70.split('.')[0]}.</span>
                <span class="top3-pill top3-pill-20">20% ${rec.r20.split('.')[0]}.</span>
                <span class="top3-pill top3-pill-10">10% ${rec.r10.split('.')[0]}.</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(top3Card);
  }

  // ── Comentarios ───────────────────────────────────────────
  if (comentarios.length > 0) {
    const commCard = document.createElement('div');
    commCard.className = 'section-card';
    commCard.innerHTML = `<div class="sub-title" style="margin-top:0">Comentarios recibidos</div>
      ${comentarios.map(c=>`<div class="comment-box"><div class="comment-tipo ${c.tipo}">${c.tipo==='lider'?'Del líder':'Autoevaluación'}</div><div class="comment-text">${c.texto||'—'}</div></div>`).join('')}`;
    container.appendChild(commCard);
  }

  show('report');

  // ── Render gráficas ──────────────────────────────────────
  const lbl = promedios.map(p=>p.nombre.length>14?p.nombre.substr(0,14)+'…':p.nombre);
  new Chart(document.getElementById('ibar'),{type:'bar',data:{labels:lbl,datasets:[
    {label:'Líder',data:promedios.map(p=>p.prom_lider),backgroundColor:'rgba(30,58,95,.75)',borderRadius:4},
    {label:'Autoevaluación',data:promedios.map(p=>p.prom_auto),backgroundColor:'rgba(22,163,74,.6)',borderRadius:4},
  ]},options:{scales:{y:{min:0,max:5}},plugins:{legend:{position:'top'}}}});
  new Chart(document.getElementById('irad'),{type:'radar',data:{labels:lbl,datasets:[
    {label:'Líder',data:promedios.map(p=>p.prom_lider),backgroundColor:'rgba(30,58,95,.12)',borderColor:'#1E3A5F',borderWidth:2,pointRadius:3},
    {label:'Autoevaluación',data:promedios.map(p=>p.prom_auto),backgroundColor:'rgba(22,163,74,.1)',borderColor:'#16A34A',borderWidth:2,pointRadius:3},
  ]},options:{scales:{r:{min:0,max:5,ticks:{font:{size:9}},pointLabels:{font:{size:9}}}},plugins:{legend:{position:'top'}}}});
}

function reloadWithPersona(pid2) {
  const p = new URLSearchParams(window.location.search); p.set('persona_id',pid2); window.location.search=p.toString();
}

// ── Router ────────────────────────────────────────────────────
async function init() {
  const {proceso_id,tipo,lider_email,persona_id} = getParams();
  if (!proceso_id||!tipo) { document.getElementById('err-detail').textContent='Faltan parámetros en la URL.'; show('error'); return; }
  try {
    if (tipo==='general')         await renderGeneral(proceso_id);
    else if (tipo==='lider')      await renderLider(proceso_id,lider_email);
    else if (tipo==='individual') await renderIndividual(proceso_id,persona_id);
    else { document.getElementById('err-detail').textContent='Tipo no válido: '+tipo; show('error'); }
  } catch(e) { document.getElementById('err-detail').textContent=e.message; show('error'); }
}
init();
</script>
